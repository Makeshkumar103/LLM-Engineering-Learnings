<svg xmlns="http://www.w3.org/2000/svg" width="800" height="420" viewBox="0 0 800 420" aria-label="Panda rollerblading to work">
  
  <defs>
    <linearGradient id="sky" x1="0" x2="0" y1="0" y2="1">
      <stop stop-color="#87cefa" offset="0"/>
      <stop stop-color="#b3e0ff" offset="0.7"/>
      <stop stop-color="#e6f2ff" offset="1"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" x2="0" y1="0" y2="1">
      <stop stop-color="#d2b48c" offset="0"/>
      <stop stop-color="#c39a6a" offset="1"/>
    </linearGradient>
    <style>
      .shadow{opacity:.25}
      .panda{fill:#fff;stroke:#000;stroke-width:2}
      .panda-dark{fill:#000}
      .shirt{fill:#ffffff}
      .tie{fill:#e60023}
      .pants{fill:#2b2b2b}
      .briefcase{fill:#8b5e3c;stroke:#000;stroke-width:2}
      .eye{fill:#000}
      .cheek{fill:#fbd9d9}
      .wheel{fill:#555}
      .blade{fill:#c0c0c0;stroke:#666;stroke-width:2}
      .line{stroke:#7a7a7a;stroke-width:3;stroke-linecap:round}
      .caption{font-family:Arial, sans-serif; font-size:14px; fill:#555}
    </style>
  </defs>

  
  <rect x="0" y="260" width="800" height="160" fill="url(#ground)" style=";animation-delay:0.0s" class="reveal"/>
  <rect x="0" y="240" width="800" height="20" fill="#7a7a7a" opacity=".25" style=";animation-delay:0.1s" class="reveal"/>

  
  <g opacity=".25">
    <rect x="60" y="150" width="60" height="110" fill="#cfe3f6" style=";animation-delay:0.3s" class="reveal"/>
    <rect x="140" y="120" width="80" height="140" fill="#d8e6f0" style=";animation-delay:0.4s" class="reveal"/>
    <rect x="230" y="100" width="90" height="160" fill="#e6f0f9" style=";animation-delay:0.6s" class="reveal"/>
    <rect x="320" y="120" width="70" height="140" fill="#d4e0f9" style=";animation-delay:0.8s" class="reveal"/>
  </g>

  
  <g transform="translate(100,140)">

    
    <ellipse class="shadow reveal" cx="170" cy="190" rx="60" ry="14" fill="#000" opacity=".15" style=";animation-delay:0.9s"/>

    
    <g transform="translate(110,120)">
      
      <g transform="translate(-20,60)">
        
        <rect x="-18" y="0" width="36" height="60" rx="6" class="pants reveal" style=";animation-delay:1.1s"/>
        
        <rect x="-30" y="52" width="60" height="14" rx="4" fill="#222" opacity=".8" style=";animation-delay:1.2s" class="reveal"/>
        
        <circle cx="-20" cy="66" r="8" fill="#333" style=";animation-delay:1.3s" class="reveal"/>
        <circle cx="20" cy="66" r="8" fill="#333" style=";animation-delay:1.5s" class="reveal"/>
        
        <rect x="-30" y="60" width="60" height="6" rx="2" class="blade reveal" style=";animation-delay:1.6s"/>
        <rect x="-34" y="66" width="68" height="8" rx="2" fill="#bbb" opacity=".6" style=";animation-delay:1.8s" class="reveal"/>
      </g>

      
      <g transform="translate(70,60)">
        
        <rect x="-18" y="0" width="36" height="60" rx="6" class="pants reveal" style=";animation-delay:1.9s"/>
        
        <rect x="-30" y="52" width="60" height="14" rx="4" fill="#222" opacity=".8" style=";animation-delay:2.1s" class="reveal"/>
        
        <circle cx="-20" cy="66" r="8" fill="#333" style=";animation-delay:2.2s" class="reveal"/>
        <circle cx="20" cy="66" r="8" fill="#333" style=";animation-delay:2.4s" class="reveal"/>
        
        <rect x="-30" y="60" width="60" height="6" rx="2" class="blade reveal" style=";animation-delay:2.5s"/>
        <rect x="-34" y="66" width="68" height="8" rx="2" fill="#bbb" opacity=".6" style=";animation-delay:2.7s" class="reveal"/>
      </g>
    </g>

    
    <g transform="translate(60,20)">
      
      <ellipse cx="110" cy="60" rx="70" ry="60" class="panda reveal" style=";animation-delay:2.8s"/>
      
      <ellipse cx="110" cy="78" rx="60" ry="40" fill="#fff" opacity=".9" style=";animation-delay:3.0s" class="reveal"/>
      
      <path d="M40,40 C60,20 120,20 140,40 L140,60 L40,60 Z" fill="#fff" stroke="#000" stroke-width="2" opacity=".9" style=";animation-delay:3.1s" class="reveal"/>
      
      <polygon points="106,52 118,92 94,92" class="tie reveal" style=";animation-delay:3.3s"/>
      
      <rect x="84" y="60" width="54" height="60" fill="#fff" opacity=".95" stroke="#000" stroke-width="2" style=";animation-delay:3.4s" class="reveal"/>
      
      <circle cx="110" cy="40" r="28" fill="#fff" stroke="#000" stroke-width="2" style=";animation-delay:3.6s" class="reveal"/>
      <ellipse cx="100" cy="34" rx="6" ry="6" class="eye reveal" style=";animation-delay:3.7s"/>
      <ellipse cx="122" cy="34" rx="6" ry="6" class="eye reveal" style=";animation-delay:3.9s"/>
      <circle cx="100" cy="36" r="2" class="eye reveal" fill="#fff" style=";animation-delay:4.0s"/>
      <circle cx="122" cy="36" r="2" class="eye reveal" fill="#fff" style=";animation-delay:4.2s"/>
      
      <ellipse cx="90" cy="42" rx="6" ry="5" class="cheek reveal" fill="#fbd9d9" style=";animation-delay:4.3s"/>
      <ellipse cx="130" cy="42" rx="6" ry="5" class="cheek reveal" fill="#fbd9d9" style=";animation-delay:4.5s"/>
      
      <ellipse cx="80" cy="18" rx="12" ry="18" fill="#000" style=";animation-delay:4.7s" class="reveal"/>
      <ellipse cx="140" cy="18" rx="12" ry="18" fill="#000" style=";animation-delay:4.8s" class="reveal"/>
    </g>

    
    <g transform="translate(6,-10)">
      <rect x="180" y="60" width="72" height="48" rx="6" class="briefcase reveal" style=";animation-delay:5.0s"/>
      <rect x="180" y="60" width="72" height="12" rx="3" fill="#000" opacity=".08" style=";animation-delay:5.1s" class="reveal"/>
      <rect x="190" y="78" width="52" height="28" rx="4" fill="#fff" opacity=".25" style=";animation-delay:5.3s" class="reveal"/>
      
      <rect x="196" y="44" width="44" height="20" rx="4" fill="#333" style=";animation-delay:5.4s" class="reveal"/>
    </g>

  </g>

  
  <g opacity=".9" stroke="#6b6b6b" stroke-width="2" fill="none">
    <path d="M40,240 C60,230 90,230 110,240" style=";animation-delay:5.6s" class="reveal"/>
    <path d="M330,250 C350,238 380,238 400,248" style=";animation-delay:5.7s" class="reveal"/>
  </g>

  
  <text x="20" y="380" class="caption">Panda rolls to work in style</text>

  
  <circle cx="680" cy="60" r="38" fill="#ffd166" opacity=".9" style=";animation-delay:5.9s" class="reveal"/>
  <circle cx="680" cy="60" r="22" fill="#ffb703" style=";animation-delay:6.0s" class="reveal"/>

<style>
        @keyframes reveal { from { opacity: 0; } to { opacity: 1; } }
        .reveal { opacity: 0; animation: reveal 0.002s linear forwards; }
        </style></svg>